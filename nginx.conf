server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # This nginx sits behind a TLS proxy (Caddy) — emit relative Location headers so
  # redirects never leak the internal port/scheme (http://…:8080).
  absolute_redirect off;

  # Same-origin relay to the leadbot (separate stack, published on the host).
  # The studio posts КП/расчёт here so the request inherits the page's scheme +
  # origin — no CORS, and no mixed-content block when served over https.
  # `hostgw` is mapped to host-gateway in docker-compose.yml.
  location = /api/order {
    client_max_body_size 25m;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_pass http://hostgw:8103/order;
  }
  location = /api/lead {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_pass http://hostgw:8103/lead;
  }

  # /biznesu was only ever an alias of the home page — permanent redirect.
  # $is_args$args keeps ad-click params (gclid/utm) alive across the redirect.
  location = /biznesu { return 301 /$is_args$args; }

  # Legacy old-site URLs (folkprint.uz before the rebuild) that may live on in
  # bookmarks / Instagram bios / chat history.
  location = /shop  { return 301 /lichnoe$is_args$args; }
  location = /links { return 301 "/#contacts"; }

  # One canonical URL per route: strip trailing slashes (/studio/ → /studio).
  # The regex never matches "/" itself; query strings are preserved.
  location ~ ^(?<fp_path>.+)/$ { return 301 $fp_path$is_args$args; }

  # Serve the per-route SEO shell (/lichnoe → /lichnoe/index.html) DIRECTLY, with no
  # trailing-slash 301, so the served URL matches the canonical. Unknown paths are a
  # REAL 404 (noindex 404.html body) — previously they fell back to the home shell
  # with a 200, i.e. a soft-404 on every stale/probed URL.
  location / {
    try_files $uri $uri/index.html =404;
  }
  error_page 404 /404.html;

  # hashed build assets — cache hard
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
